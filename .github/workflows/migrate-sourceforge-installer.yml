name: Migrate SourceForge installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-24.04
    steps:
      - name: Prepare installer
        run: |
          set -euo pipefail

          curl -fsSL https://forkop.sourceforge.io/install.sh -o sourceforge-install.sh
          python3 - sourceforge-install.sh <<'PY'
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          data = path.read_bytes()
          start_marker = b'\nfetch_github_latest_release_json() {\n'
          end_marker = b'\ncleanup_legacy_installation() {\n'
          if data.count(start_marker) != 1 or data.count(end_marker) != 1:
              raise SystemExit('unexpected installer release resolver boundaries')

          replacement = b'''\nfetch_sourceforge_latest_release_tag() {
              response="$(http_get "https://sourceforge.net/projects/forkop/best_release.json" 2>/dev/null || true)"
              [ -n "$response" ] || fail "Failed to query SourceForge latest release metadata"

              printf '%s' "$response" |
                  sed -n 's#.*"filename":[[:space:]]*"/\\([^"/]*\\)/.*#\\1#p' |
                  head -n 1
          }

          resolve_forkop_release() {
              asset_ext="ipk"
              [ "$PKG_IS_APK" -eq 1 ] && asset_ext="apk"

              FORKOP_RELEASE_TAG="$(fetch_sourceforge_latest_release_tag)"
              printf '%s\\n' "$FORKOP_RELEASE_TAG" | grep -Eq '^[0-9]+\\.[0-9]+\\.[0-9]+$' ||
                  fail "Failed to detect the Forkop release tag"

              base_url="https://downloads.sourceforge.net/project/forkop/${FORKOP_RELEASE_TAG}"
              FORKOP_BACKEND_NAME="forkop_${FORKOP_RELEASE_TAG}.${asset_ext}"
              FORKOP_APP_NAME="luci-app-forkop_${FORKOP_RELEASE_TAG}.${asset_ext}"
              FORKOP_BACKEND_URL="${base_url}/${FORKOP_BACKEND_NAME}"
              FORKOP_APP_URL="${base_url}/${FORKOP_APP_NAME}"
              FORKOP_PACKAGE_VERSION="$FORKOP_RELEASE_TAG"

              FORKOP_I18N_URL=""
              FORKOP_I18N_NAME=""
              if [ "$FORKOP_I18N_REQUESTED" -eq 1 ]; then
                  FORKOP_I18N_NAME="luci-i18n-forkop-ru_${FORKOP_RELEASE_TAG}.${asset_ext}"
                  FORKOP_I18N_URL="${base_url}/${FORKOP_I18N_NAME}"
              fi
          }
          '''

          start = data.index(start_marker)
          end = data.index(end_marker, start)
          path.write_bytes(data[:start] + replacement + data[end:])
          PY

          sh -n sourceforge-install.sh
          grep -Fq 'https://sourceforge.net/projects/forkop/best_release.json' sourceforge-install.sh
          grep -Fq 'https://downloads.sourceforge.net/project/forkop/${FORKOP_RELEASE_TAG}' sourceforge-install.sh
          ! grep -Fq 'forkop.sourceforge.io/releases/latest.json' sourceforge-install.sh

      - name: Publish installer
        env:
          SOURCEFORGE_SSH_PRIVATE_KEY: ${{ secrets.SOURCEFORGE_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          test -n "$SOURCEFORGE_SSH_PRIVATE_KEY"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$SOURCEFORGE_SSH_PRIVATE_KEY" > "$HOME/.ssh/sourceforge"
          chmod 0600 "$HOME/.ssh/sourceforge"
          ssh-keyscan -t ed25519 web.sourceforge.net > "$HOME/.ssh/known_hosts"
          ssh-keygen -lf "$HOME/.ssh/known_hosts" -E sha256 |
            grep -Fq 'SHA256:209BDmH3jsRyO9UeGPPgLWPSegKmYCBIya0nR/AWWCY'

          sftp -i "$HOME/.ssh/sourceforge" -b - ushan0v@web.sourceforge.net <<EOF
          put sourceforge-install.sh /home/project-web/forkop/htdocs/install.sh.new
          rename /home/project-web/forkop/htdocs/install.sh.new /home/project-web/forkop/htdocs/install.sh
          EOF

          for attempt in $(seq 1 12); do
            if curl -fsSL "https://forkop.sourceforge.io/install.sh?run=${GITHUB_RUN_ID}-${attempt}" \
              -o published-install.sh && cmp -s sourceforge-install.sh published-install.sh; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Remove SSH key
        if: ${{ always() }}
        run: rm -f "$HOME/.ssh/sourceforge"
